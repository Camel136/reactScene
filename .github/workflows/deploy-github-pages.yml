name: Deploy GitHub Pages

on:
  push:
    branches:
      - main # ou 'master', dependendo da sua branch padrão

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

      # ⚠️ PASSO CRÍTICO: Adiciona o arquivo .nojekyll para desativar o Jekyll
      - name: Disable Jekyll
        run: touch ./dist/.nojekyll

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read # Adicione esta permissão

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
